name: Build & Upload Artifacts
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact: linux-artifacts
            glob: |
              dist/*.deb
              dist/*.rpm
              dist/*.AppImage
              dist/*.pacman
          - os: windows-latest
            script: dist:win
            artifact: windows-artifacts
            glob: |
              dist/*.exe
          - os: macos-latest
            script: dist:mac
            artifact: macos-artifacts
            glob: |
              dist/*.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install bsdtar (Linux, needed by fpm for pacman)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Cache electron + electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ matrix.os }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        run: npm ci

      - name: Build (${{ matrix.script }})
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
